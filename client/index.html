<body class="dark">
  <div id="root"></div>
  <!-- GitHub Pages SPA: restore path encoded by 404.html -->
  <script>
    (function () {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
      // Also handle the ?p= query-string technique used by 404.html
      var qs = window.location.search;
      if (qs.indexOf('?p=/') === 0) {
        var path = qs.slice(3).replace(/~and~/g, '&');
        history.replaceState(null, null, window.location.pathname.split('?')[0] + path);
      }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
