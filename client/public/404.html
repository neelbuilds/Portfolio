<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Neel Patel - Portfolio</title>
    <script>
        // GitHub Pages SPA redirect trick.
        // When GitHub Pages returns 404 for a deep link, it serves this file.
        // We encode the path into the query string and redirect to index.html,
        // which then restores the route via the script in index.html.
        var segmentCount = 1; // number of path segments in the base URL (/Portfolio = 1)
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
            l.pathname.split('/').slice(1 + segmentCount).join('/').replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body></body>

</html>
